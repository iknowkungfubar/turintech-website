name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@07024f21fe54e5e2d011b0ef2cff5952e13ddc48 # v2.1.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bunx astro build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@025849fc4cb7f69e8aa691b9d843b90ec41b54ad # v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@9c1636a29f977b93735040ef38e4dc9bec9f1e7c # v5.0.0
